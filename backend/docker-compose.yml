services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: jago
      POSTGRES_PASSWORD: jago
      POSTGRES_DB: jago
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jago"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # management UI (guest/guest)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    environment:
      APP_PORT: "8080"
      DATABASE_URL: "postgres://jago:jago@postgres:5432/jago?sslmode=disable"
      REDIS_URL: "redis://redis:6379/0"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
      JWT_SECRET: "dev-secret-change-me"
      ADMIN_API_KEY: "admin-secret"
    ports:
      - "8080:8080"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }

  worker:
    build: .
    entrypoint: ["/worker"]
    environment:
      DATABASE_URL: "postgres://jago:jago@postgres:5432/jago?sslmode=disable"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }

  # One-shot migration runner: `docker compose run --rm migrate <up|down|status>`
  migrate:
    build: .
    entrypoint: ["/migrate"]
    command: ["up"]
    environment:
      DATABASE_URL: "postgres://jago:jago@postgres:5432/jago?sslmode=disable"
    depends_on:
      postgres: { condition: service_healthy }
    profiles: ["tools"]

volumes:
  pgdata:
